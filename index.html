<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileForge – All-in-One File Utility</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-200 py-4 px-6 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold tracking-tight text-gray-900">📁 FileForge</h1>
        <div id="auth-section" class="flex gap-3">
            <input id="email" type="email" placeholder="Email" class="border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-black">
            <input id="password" type="password" placeholder="Password" class="border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-black">
            <button onclick="handleAuth('login')" class="bg-black text-white text-sm px-4 py-1.5 rounded hover:bg-gray-800 transition">Login</button>
            <button onclick="handleAuth('signup')" class="border border-black text-sm px-4 py-1.5 rounded hover:bg-gray-100 transition">Sign Up</button>
        </div>
        <div id="user-section" class="hidden flex items-center gap-4">
            <span id="user-email" class="text-sm font-medium text-gray-600"></span>
            <button onclick="handleLogout()" class="text-sm text-red-600 hover:underline">Logout</button>
        </div>
    </header>

    <main class="flex-grow max-w-6xl w-full mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-8 my-6">
        
        <section class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm space-y-6">
            <h2 class="text-lg font-bold border-b pb-2">⚙️ File Utilities</h2>
            
            <div>
                <label class="block text-xs uppercase tracking-wider text-gray-500 font-bold mb-2">Select Utility</label>
                <select id="tool-selector" onchange="switchTool()" class="w-full border border-gray-300 rounded-lg p-2.5 bg-white focus:outline-none focus:border-black">
                    <option value="compress-pdf">Compress PDF</option>
                    <option value="compress-image">Compress Image</option>
                    <option value="split-pdf">Split PDF</option>
                    <option value="images-to-pdf">Images to PDF</option>
                </select>
            </div>

            <div class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center bg-gray-50 hover:bg-gray-100 transition relative">
                <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" multiple />
                <p id="upload-prompt" class="text-sm text-gray-600 font-medium">Click or drag files here to process</p>
                <p class="text-xs text-gray-400 mt-1" id="file-info">No file selected</p>
            </div>

            <button onclick="processFile()" class="w-full bg-black text-white py-3 rounded-lg font-medium hover:bg-gray-900 transition tracking-wide">Execute Action</button>
            <div id="download-link-container" class="hidden text-center mt-2"></div>
        </section>

        <section class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-between">
            <div>
                <h2 class="text-lg font-bold border-b pb-2 mb-4">🚀 P2P Instant PeerJS Share</h2>
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 mb-4">
                    <p class="text-xs text-gray-500 font-semibold uppercase">Your Sharing ID</p>
                    <p id="my-peer-id" class="text-sm font-mono select-all bg-white p-2 border rounded mt-1 text-gray-700">Connecting...</p>
                </div>

                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Receiver Peer ID</label>
                        <input id="receiver-peer-id" type="text" placeholder="Paste partner's ID here" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:outline-none focus:border-black">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Select File to Send</label>
                        <input type="file" id="share-file-input" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-gray-100 file:text-black hover:file:bg-gray-200">
                    </div>
                </div>
            </div>

            <button onclick="sendFileP2P()" class="w-full mt-6 bg-emerald-600 text-white py-3 rounded-lg font-medium hover:bg-emerald-700 transition tracking-wide">Direct Transfer P2P</button>
        </section>
    </main>

    <footer class="text-center py-4 text-xs text-gray-400 border-t bg-white">
        &copy; 2026 FileForge Inc. Secure & Private Client-Side Ecosystem.
    </footer>

    <script>
        const SUPABASE_URL = "https://rziqbgttxzlvmzsgyeov.supabase.co";
        const SUPABASE_KEY = "sb_publishable_dvLA7nRLEueWOCS6Cf74tw_fD4kl3hG"; // Public key provided
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const BACKEND_URL = "http://localhost:5000";

        let peer;
        let activeUser = null;

        // Sync local upload input displays
        document.getElementById('file-input').addEventListener('change', (e) => {
            const files = e.target.files;
            document.getElementById('file-info').innerText = files.length > 1 ? `${files.length} files selected` : files[0]?.name || "No file selected";
        });

        // Auth management
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert('Fill credentials');

            const { data, error } = type === 'login' 
                ? await supabase.auth.signInWithPassword({ email, password })
                : await supabase.auth.signUp({ email, password });

            if (error) alert(error.message);
            else {
                activeUser = data.user;
                updateAuthUI();
            }
        }

        function updateAuthUI() {
            if(activeUser) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('user-section').classList.remove('hidden');
                document.getElementById('user-email').innerText = activeUser.email;
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('user-section').classList.add('hidden');
            }
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            activeUser = null;
            updateAuthUI();
        }

        // Processing Router
        async function processFile() {
            const tool = document.getElementById('tool-selector').value;
            const fileInput = document.getElementById('file-input');
            if(fileInput.files.length === 0) return alert('Please upload files first!');

            const formData = new FormData();
            for(let file of fileInput.files) {
                formData.append('files', file);
            }

            try {
                const response = await fetch(`${BACKEND_URL}/api/${tool}`, {
                    method: 'POST',
                    body: formData
                });
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                
                const container = document.getElementById('download-link-container');
                container.innerHTML = `<a href="${url}" download="processed-file" class="text-sm font-semibold text-blue-600 underline hover:text-blue-800">🎉 Download Output File Here</a>`;
                container.classList.remove('hidden');
            } catch (err) {
                console.error(err);
                alert('Processing encountered an error.');
            }
        }

        // Initialize PeerJS
        function initPeer() {
            peer = new Peer();
            peer.on('open', (id) => {
                document.getElementById('my-peer-id').innerText = id;
            });
            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.file) {
                        const blob = new Blob([data.file], { type: data.type });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = data.name;
                        a.click();
                        alert(`Received file: ${data.name}`);
                    }
                });
            });
        }

        async function sendFileP2P() {
            const targetId = document.getElementById('receiver-peer-id').value;
            const fileInput = document.getElementById('share-file-input');
            if(!targetId || !fileInput.files[0]) return alert('Provide recipient ID and file contents.');

            const file = fileInput.files[0];
            const conn = peer.connect(targetId);

            conn.on('open', async () => {
                conn.send({
                    file: file,
                    name: file.name,
                    type: file.type
                });
                alert('File broadcasted directly over PeerJS Connection mesh! Logs optimized.');

                if(activeUser) {
                    // Log metadata transaction trace securely to Supabase
                    await supabase.from('shared_files').insert([
                        { sender_id: activeUser.id, file_name: file.name, file_size: file.size, peer_id: targetId }
                    ]);
                }
            });
        }

        function switchTool() {
            document.getElementById('download-link-container').classList.add('hidden');
        }

        // Self init
        initPeer();
    </script>
</body>
</html>
